name: Build and publish Odysseus Docker image

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: "Upstream branch to build"
        required: false
        default: "dev"
        type: choice
        options:
          - main
          - dev
      custom_tag:
        description: "Custom tag (optional)"
        required: false
        type: string

env:
  IMAGE_NAME: realitymolder/odysseus

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Determine upstream branch and tags
        id: vars
        run: |
          EVENT="${{ github.event_name }}"
          REF="${{ github.ref }}"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            BRANCH="${{ github.event.inputs.upstream_branch }}"
            CUSTOM_TAG="${{ github.event.inputs.custom_tag }}"
            if [ -n "$CUSTOM_TAG" ]; then
              TAGS="$CUSTOM_TAG"
            elif [ "$BRANCH" = "main" ]; then
              TAGS="stable,$(date -u +%Y-%m-%d)"
            else
              TAGS="dev,dev-$(date -u +%Y-%m-%d)"
            fi
          elif [ "$REF" = "refs/heads/main" ]; then
            BRANCH="main"
            TAGS="stable,$(date -u +%Y-%m-%d)"
          else
            BRANCH="dev"
            TAGS="dev,dev-$(date -u +%Y-%m-%d)"
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Checkout upstream Odysseus
        uses: actions/checkout@v4
        with:
          repository: pewdiepie-archdaemon/odysseus
          ref: ${{ steps.vars.outputs.branch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          build-args: |
            INSTALL_OPTIONAL=false
