services:
  odysseus-aio:
    build:
      context: .
      dockerfile: aio/Dockerfile
    container_name: odysseus-aio
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - odysseus-aio-data:/data
      - ./test-data/app:/mnt/user/appdata/odysseus-aio/data
      - ./test-data/ssh:/mnt/user/appdata/odysseus-aio/ssh
      - ./test-data/chromadb:/mnt/user/appdata/odysseus-aio/chromadb
    environment:
      - ODYSSEUS_APP_DATA=/mnt/user/appdata/odysseus-aio/data
      - ODYSSEUS_APP_SSH=/mnt/user/appdata/odysseus-aio/ssh
      - ODYSSEUS_CHROMADB_DATA=/mnt/user/appdata/odysseus-aio/chromadb
      - ODYSSEUS_APP_PORT=7000
      - ODYSSEUS_CHROMADB_PORT=8100
      - ODYSSEUS_SEARXNG_PORT=8080
      - ODYSSEUS_NTFY_PORT=8091
      - ODYSSEUS_PUID=99
      - ODYSSEUS_PGID=100
      - ODYSSEUS_AUTH_ENABLED=true
      - ODYSSEUS_ADMIN_USER=admin
      - ODYSSEUS_DNS_SERVERS=8.8.8.8,1.1.1.1
    restart: unless-stopped

volumes:
  odysseus-aio-data:
